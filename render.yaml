services:
  - type: web
    name: trackboard-api
    runtime: docker
    plan: free
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /api/v1/health/ready
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        value: memory://
      - key: JWT_SECRET
        sync: false
      - key: SECRET_ENCRYPTION_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        sync: false
      - key: ALLOW_PRIVATE_AI_ENDPOINTS
        value: "false"
      - key: DEBUG
        value: "false"
